name: Run My Playwright Tests

on:
  schedule:
    - cron: '16 * * * *'  # Каждый день в xx:xx UTC
  workflow_dispatch:
    inputs:
      test_marker:
        description: 'Pytest marker (empty = all tests)'
        required: false
        default: ''
        type: string
      browser:
        description: 'Browser to use'
        required: false
        default: 'chromium'
        type: choice
        options: [chromium, firefox, webkit]
      full_report:
        description: 'Generate full Allure report'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      python-version: ${{ steps.versions.outputs.python-version }}
      playwright-version: ${{ steps.versions.outputs.playwright-version }}
      pytest-version: ${{ steps.versions.outputs.pytest-version }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install --with-deps chromium firefox
    - name: -= SHOW TIME =-
      run: date
    - name: -= RUN MY TESTS HERE =-
      run: |
        pytest ./tests2/test_inet_tester_3.py -v --tb=short
