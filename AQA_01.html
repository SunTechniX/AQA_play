<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <style>
            li:nth-child(1) {
                color:red;
            }
            li:nth-child(2) {
                color:darkgreen;
                font-weight:600;
            }
            .dt {
                color:darkblue;

            }
            #mr {

            }

            <li>Запись 2</li>

                <ol>
                    <li>Имя                                        <br>А</li>

                    <li attr="end of text">Имя Г

                    </li>

            </li>
